spring.application.name=sejuega-backend
spring.config.import=optional:file:../variables-entorno/backend.env[.properties]

# Puerto del servidor (default 8080, puede override con SERVER_PORT)
server.port=${SERVER_PORT:8080}

# ============ BASE DE DATOS - TODAS LAS VARIABLES REQUERIDAS ============
# NO hay defaults - todas deben estar en variables-entorno/backend.env o env del sistema
spring.datasource.url=${CORE_DB_URL}
spring.datasource.username=${CORE_DB_USER}
spring.datasource.password=${CORE_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============ JPA / HIBERNATE ============
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============ CORS ============
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ============ AUTENTICACIÓN & SEGURIDAD - TODAS LAS VARIABLES REQUERIDAS ============
# NO hay defaults - todas deben estar en variables-entorno/backend.env o env del sistema
auth.mode=firebase
auth.dev-header.enabled=false
auth.firebase.enabled=true
auth.firebase.project-id=${FIREBASE_PROJECT_ID}
auth.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:../variables-entorno/firebase-service-account.json}
auth.firebase.fail-fast=true
auth.firebase.check-revoked=${FIREBASE_CHECK_REVOKED:false}